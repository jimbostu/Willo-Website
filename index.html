<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Willo Idea Lab - Building Apps For Everyone Everywhere</title>
    <link rel="icon" type="image/png" href="AppIcon.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');

        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --purple-deep: #1a0a2e;
            --purple-mid: #2d1b4e;
            --purple-accent: #6b3fa0;
            --red-hot: #e63946;
            --orange-fire: #ff6b35;
            --orange-glow: #ffa500;
            --white: #f8f8f8;
            --gray-light: #c0b8d0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--purple-deep);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 3rem 2rem;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 50%, rgba(230, 57, 70, 0.12) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 50%, rgba(255, 107, 53, 0.08) 0%, transparent 50%),
                        radial-gradient(ellipse at 50% 20%, rgba(107, 63, 160, 0.15) 0%, transparent 50%);
            animation: glow 8s ease-in-out infinite alternate;
            z-index: 0;
        }

        @keyframes glow {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-2%, 2%) scale(1.05); }
        }

        .content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3.5rem;
        }

        /* COMPANY */
        .company {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .company-icon {
            width: 100px;
            height: 100px;
            border-radius: 24px;
            box-shadow: 0 0 50px rgba(230, 57, 70, 0.3), 0 0 100px rgba(255, 107, 53, 0.12);
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .company h1 {
            font-size: clamp(2.2rem, 6vw, 3.8rem);
            font-weight: 900;
            letter-spacing: -1px;
            line-height: 1.1;
        }

        .company h1 .gradient {
            background: linear-gradient(135deg, var(--orange-fire), var(--red-hot), var(--orange-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .company .tagline {
            font-size: clamp(1rem, 2.5vw, 1.25rem);
            color: var(--gray-light);
            font-weight: 600;
            letter-spacing: 1px;
        }

        /* DIVIDER */
        .divider {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, var(--red-hot), var(--orange-fire));
            border-radius: 2px;
        }

        /* SNAPSAUCE */
        .app-showcase {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .app-logo {
            width: 200px;
            height: auto;
            filter: drop-shadow(0 8px 30px rgba(230, 57, 70, 0.3));
            transition: transform 0.3s;
        }

        .app-logo:hover {
            transform: scale(1.05);
        }

        .app-badge {
            display: inline-block;
            padding: 0.4rem 1.2rem;
            background: linear-gradient(135deg, var(--red-hot), var(--orange-fire));
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        /* CONTACT */
        .contact {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.8rem;
        }

        .contact-label {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--gray-light);
        }

        .contact-email {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.9rem 2rem;
            background: rgba(107, 63, 160, 0.15);
            border: 1px solid rgba(107, 63, 160, 0.3);
            border-radius: 50px;
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--white);
            text-decoration: none;
            transition: all 0.3s;
        }

        .contact-email:hover {
            border-color: var(--orange-fire);
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(230, 57, 70, 0.15);
        }

        .contact-email svg {
            width: 20px;
            height: 20px;
            fill: var(--orange-fire);
        }

        /* FOOTER */
        .footer {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: rgba(192, 184, 208, 0.5);
        }

        .footer a {
            color: inherit;
            text-decoration: none;
            border-bottom: 1px solid rgba(192, 184, 208, 0.25);
            transition: color 0.2s, border-color 0.2s;
        }

        .footer a:hover {
            color: var(--orange-fire);
            border-bottom-color: var(--orange-fire);
        }

        .footer .sep {
            margin: 0 0.6rem;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="content">

        <!-- COMPANY -->
        <div class="company">
            <img src="AppIcon.png" alt="Willo Idea Lab" class="company-icon">
            <h1><span class="gradient">Willo Idea Lab</span></h1>
            <p class="tagline">Building Apps For Everyone Everywhere</p>
        </div>

        <div class="divider"></div>

        <!-- SNAPSAUCE -->
        <div class="app-showcase">
            <img src="Logo.png" alt="SnapSauce" class="app-logo">
            <span class="app-badge">Coming Soon</span>
        </div>

        <div class="divider"></div>

        <!-- CONTACT -->
        <div class="contact">
            <p class="contact-label">Contact or Support</p>
            <a href="mailto:jim@willoidealab.com" class="contact-email">
                <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
                jim@willoidealab.com
            </a>
        </div>

        <p class="footer">
            &copy; 2026 Willo Idea Lab
            <span class="sep">&middot;</span>
            <a href="privacy.html">Privacy Policy</a>
        </p>

    </div>

</body>
</html>
